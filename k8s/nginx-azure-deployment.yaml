apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-custom-index
  labels:
    app: nginx-azure
data:
  index.html: |
    <!doctype html>
    <html>
      <head>
        <meta charset="utf-8">
        <title>NGINX on AKS</title>
      </head>
      <body>
        <h1>Welcome to NGINX on Azure Kubernetes Service (AKS)</h1>
        <p>Served from a ConfigMap-backed index.html</p>
      </body>
    </html>

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-azure
  labels:
    app: nginx-azure
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-azure
  template:
    metadata:
      labels:
        app: nginx-azure
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-index
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: nginx-index
          configMap:
            name: nginx-custom-index

---
apiVersion: v1
kind: Service
metadata:
  name: nginx-azure-lb
  labels:
    app: nginx-azure
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    app: nginx-azure

# Notes:
# - Apply with `kubectl apply -f k8s/nginx-azure-deployment.yaml` to create resources on AKS.
# - On AKS, a Service of type `LoadBalancer` will provision an Azure public IP by default.